# fly.toml app configuration file generated for chess-rs on 2026-05-15T14:29:57-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chess-rs'
primary_region = 'dfw'

[build]

[env]
  ENV = 'production'
  LEPTOS_OUTPUT_NAME = 'web'
  LEPTOS_SITE_ADDR = '0.0.0.0:8080'
  LEPTOS_SITE_ROOT = '/app/site'
  RUST_LOG = 'web=info,tower_http=info,tower_sessions=info'
  SQLX_OFFLINE = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
